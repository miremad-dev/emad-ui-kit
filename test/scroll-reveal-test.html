<!doctype html>
<html>
  <head>
    <title>ScrollReveal Test</title>
  </head>

  <body>
    <section class="section">Section 1</section>

    <section class="section">Section 2</section>

    <script type="module">
      import ScrollReveal from "../src/animations/ScrollReveal.js";

      const reveal = new ScrollReveal(".section", {
        origin: "bottom",
        distance: "100px",
        duration: 800,
        once: true,
      });

      console.log(reveal);
      reveal.destroy();
      console.log(reveal);
    </script>
  </body>
</html>
